spring:
  application:
    name: fintrack-api
  datasource:
    url: jdbc:h2:mem:fintrackdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console (access at localhost:8081/h2-console during dev)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Tell JPA not to auto-create tables — we do it via schema.sql
  jpa:
    hibernate:
      ddl-auto: none

  # Tell Spring Boot to always run schema.sql + data.sql
  sql:
    init:
      mode: ALWAYS

server:
  port: 8081

jwt:
  secret: cWySuHVG0+eskrzylN2u/j1KCVTck0T4kZB1KTlvlTM=

# --- Add logging config ---
logging:
  level:
    root: INFO                  # default level
    com.fintrack.api.security: DEBUG   # show debug logs for your package