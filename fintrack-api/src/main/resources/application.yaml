spring:
  application:
    name: fintrack-api
  datasource:
    url: jdbc:h2:mem:fintrackdb
    driver-class-name: rg.h2.Driver
    username: sa
    password:

  # H2 Console (access at localhost:8080/h2-console during dev)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Tell JPA not to auto-create tables — we do it via schema.sql
  jpa:
    hibernate:
      ddl-auto: none

  # Tell Spring Boot to always run schema.sql + data.sql
  sql:
    init:
      mode: ALWAYS

server:
  port: 8081

